name: Steel Defect System CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install lint tools
      run: |
        pip install flake8

    - name: Run lint check
      run: |
        flake8 app --count --exit-zero --max-line-length=120 --statistics

    - name: Build API Docker image
      run: |
        docker build -f Dockerfile.api -t steel-api .

    - name: Build Dashboard Docker image
      run: |
        docker build -f Dockerfile.dashboard -t steel-dashboard .

    - name: CI Completed
      run: echo "Pipeline executed successfully"