name: Steel Defect System CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install test dependencies
      run: |
        pip install pytest fastapi uvicorn httpx

    - name: Run API tests
      run: |
        pytest

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build API Docker image
      run: |
        docker build -f Dockerfile.api -t ryukeren/steel-defect-api:latest .

    - name: Push API Docker image
      run: |
        docker push ryukeren/steel-defect-api:latest

    - name: Build Dashboard Docker image
      run: |
        docker build -f Dockerfile.dashboard -t ryukeren/steel-defect-dashboard:latest .

    - name: Push Dashboard Docker image
      run: |
        docker push ryukeren/steel-defect-dashboard:latest